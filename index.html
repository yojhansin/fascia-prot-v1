<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FASCIA — Training OS</title>
<link rel="stylesheet" href="assets/css/style.css">
<link rel="icon" type="image/png" href="assets/logo/fascia-favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=SF+Pro+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Bebas+Neue&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<!-- react-muscle-highlighter (modelo de cuerpo) -->
<script type="module">
  import React from 'https://esm.sh/react@18.3.1';
  import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client';
  import Body from 'https://esm.sh/react-muscle-highlighter@1.2.0?deps=react@18.3.1,react-dom@18.3.1';
  window.RMH = { h: React.createElement, createRoot: createRoot, Body: Body };
</script>
</head>
<body>
<div id="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><img src="assets/logo/fascia-logo.png" alt="Fascia"></div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <button class="collapse-btn" onclick="toggleSidebar()">
        <i class="fa-solid fa-chevron-left" id="collapseIcon"></i>
        <span class="collapse-label">Colapsar</span>
      </button>
      <div class="sidebar-user">
        <p id="suName">Entrenador</p>
        <span id="suSport">Multi-deporte</span>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="mainContent">

    <!-- DASHBOARD -->
    <div class="view active" id="view-dashboard">
      <div class="page-header">
        <div>
          <h1 class="page-title"><span class="page-title-bar"></span>Dashboard</h1>
          <p class="page-sub" id="dashDate"></p>
        </div>
      </div>
      <div class="stat-grid stagger" id="dashStats"></div>
      <div class="dash-grid">
        <div class="card" id="dashSports"></div>
        <div class="card" id="dashSchedule"></div>
      </div>
      <div class="dash-grid-3">
        <div class="card" id="dashRoster"></div>
        <div class="card" id="dashMetrics"></div>
      </div>
    </div>

    <!-- ATLETAS -->
    <div class="view" id="view-atletas">
      <div class="page-header">
        <div><h1 class="page-title"><span class="page-title-bar"></span>Plantel</h1><p class="page-sub" id="atletasSub"></p></div>
        <div class="page-actions">
          <div style="display:flex;gap:2px;background:var(--bg3);border:1px solid var(--line);border-radius:var(--radius-sm);padding:3px">
            <button class="tab active" id="tabGrid" onclick="setAthleteView('grid')">⊞ Grilla</button>
            <button class="tab" id="tabList" onclick="setAthleteView('lista')">☰ Lista</button>
          </div>
          <button class="btn btn-primary btn-md" onclick="openAthleteModal()"><i class="fa-solid fa-plus"></i> Nuevo Atleta</button>
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center">
        <div class="search-wrap" style="flex:1;min-width:200px">
          <i class="fa-solid fa-magnifying-glass si"></i>
          <input type="text" class="form-control" id="athleteSearch" placeholder="Buscar por nombre, deporte…" oninput="renderAthletes()">
        </div>
        <select class="form-control" id="athleteSportFilter" onchange="renderAthletes()" style="width:auto;min-width:130px"></select>
        <div style="display:flex;gap:4px" id="statusFilters"></div>
      </div>
      <div id="athletesContainer"></div>
    </div>

    <!-- RUTINAS -->
    <div class="view" id="view-rutinas">

      <!-- ░░ TOP BAR ░░ -->
      <div class="rutinas-topbar">
        <div style="display:flex;align-items:center;gap:14px">
          <div>
            <h1 class="page-title" style="font-size:1.4rem;margin-bottom:2px"><span class="page-title-bar"></span>Rutinas</h1>
            <p class="page-sub" id="rutinasSub" style="margin:0"></p>
          </div>
          <!-- Tab switcher iOS style -->
          <div class="rutinas-tab-switcher" id="rutinasTabs">
            <button class="rtab rtab-active" id="tabCrear" onclick="switchRutinaTab('crear')">
              <i class="fa-solid fa-fire-flame-curved"></i> Crear
            </button>
            <button class="rtab" id="tabVer" onclick="switchRutinaTab('ver')">
              <i class="fa-solid fa-list-ul"></i> Rutinas
            </button>
          </div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="tutorial-help-btn" onclick="startTutorial()" title="Ver tutorial"><i class="fa-solid fa-question"></i></button>
          <div class="search-wrap" style="min-width:160px">
            <i class="fa-solid fa-magnifying-glass si"></i>
            <input type="text" class="form-control" id="routineSearch" placeholder="Buscar…" oninput="renderRoutines()" style="font-size:0.8rem">
          </div>
          <select class="form-control" id="routineSportFilter" onchange="renderRoutines()" style="width:auto;font-size:0.8rem"></select>
        </div>
      </div>

      <!-- ░░ TAB: CREAR RUTINA ░░ -->
      <div id="tabPanelCrear" style="flex:1;display:flex;min-height:0;overflow:hidden;position:relative">

        <!-- body-muscles map (full area) -->
        <div class="rutinas-left-panel">
          <div class="bm-viewer-wrap" style="min-height:320px">
            <div class="bm-view-toggle">
              <button class="bm-vtbtn bm-vtbtn-active" id="btnFront" onclick="bmSwitchView('FRONT')">Frontal</button>
              <button class="bm-vtbtn" id="btnBack" onclick="bmSwitchView('BACK')">Posterior</button>
            </div>
            <div id="bmChartContainer" style="flex:1;display:flex;align-items:center;justify-content:center;min-height:300px;height:100%;padding:8px 0"></div>
            <div class="bm-hint" id="bmHint">
              <i class="fa-solid fa-hand-pointer" style="color:var(--coral);margin-right:5px"></i>
              Toca cualquier músculo para agregar a la rutina
            </div>
          </div>
        </div>

        <!-- Empty-state hint, chat-bubble style, anchored top-left -->
        <div id="builderEmptyHint" class="builder-empty-float">
          <div class="builder-empty-head">
            <span class="builder-empty-icon">💪</span>
            <p class="builder-empty-title" style="margin:0">Crea tu rutina</p>
          </div>
          <p class="builder-empty-sub" style="margin:0">Toca cualquier músculo del modelo para agregarlo y definir sus ejercicios.</p>
        </div>

        <!-- Summary bar, floating over the body map -->
        <div id="builderSummaryBar" class="builder-summary-float">
          <div class="builder-summary-stats">
            <div class="sum-stat"><p class="sum-num" id="sumMusculos">0</p><p class="sum-lbl">Músculos</p></div>
            <div style="width:1px;background:var(--line)"></div>
            <div class="sum-stat"><p class="sum-num" id="sumEjercicios">0</p><p class="sum-lbl">Ejercicios</p></div>
            <div style="width:1px;background:var(--line)"></div>
            <div class="sum-stat"><p class="sum-num" id="sumDias">—</p><p class="sum-lbl">Días</p></div>
            <div style="width:1px;background:var(--line)"></div>
            <div class="sum-stat"><p class="sum-num" id="sumMin">~0</p><p class="sum-lbl">Min</p></div>
          </div>
          <div id="sumMuscleChips" class="builder-summary-chips"></div>
          <div class="builder-summary-actions">
            <p id="builderStatus" class="builder-header-status"></p>
            <div style="display:flex;gap:7px">
              <button class="btn-ghost-xs" onclick="clearBuilderAll()"><i class="fa-solid fa-rotate-left" style="margin-right:4px"></i>Limpiar</button>
              <button id="btnFinalizar" class="btn-finalizar disabled" onclick="finalizarRutina()"><i class="fa-solid fa-floppy-disk" style="margin-right:5px"></i>Guardar Rutina</button>
            </div>
          </div>
        </div>
      </div>

      <!-- ░░ TAB: VER RUTINAS ░░ -->
      <div id="tabPanelVer" style="flex:1;overflow-y:auto;padding:18px 22px;display:none">
        <div id="routinesContainer"></div>
      </div>
    </div>

    <!-- SESIÓN EN VIVO -->
    <div class="view" id="view-session"></div>

    <!-- RENDIMIENTO -->
    <div class="view" id="view-rendimiento">
      <div class="page-header">
        <div><h1 class="page-title"><span class="page-title-bar"></span>Rendimiento</h1><p class="page-sub" id="rendSub"></p></div>
        <div class="page-actions"><button class="btn btn-primary btn-md" onclick="openMetricModal()"><i class="fa-solid fa-plus"></i> Registrar Métrica</button></div>
      </div>
      <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap">
        <div class="search-wrap" style="min-width:200px;flex:1;max-width:320px">
          <i class="fa-solid fa-magnifying-glass si"></i>
          <input type="text" class="form-control" id="rendSearch" placeholder="Buscar atleta…" oninput="renderMetrics()">
        </div>
        <select class="form-control" id="metricCatFilter" onchange="renderMetrics()" style="width:auto;min-width:160px"></select>
      </div>
      <div id="metricsContainer"></div>
    </div>

    <!-- CALENDARIO -->
    <div class="view" id="view-calendario">
      <div class="page-header">
        <div><h1 class="page-title"><span class="page-title-bar"></span>Calendario</h1></div>
        <div class="page-actions"><button class="btn btn-primary btn-md" onclick="openEventModal()"><i class="fa-solid fa-plus"></i> Nuevo Evento</button></div>
      </div>
      <div id="calendarContainer"></div>
    </div>

    <!-- NUTRICIÓN -->
    <div class="view" id="view-nutricion">
      <div class="page-header">
        <div><h1 class="page-title"><span class="page-title-bar"></span>Nutrición</h1><p class="page-sub" id="nutriSub"></p></div>
        <div class="page-actions"><button class="btn btn-primary btn-md" onclick="openNutritionModal()"><i class="fa-solid fa-plus"></i> Nuevo Plan</button></div>
      </div>
      <div id="nutritionContainer"></div>
    </div>

    <!-- PAGOS -->
    <div class="view" id="view-pagos">
      <div class="page-header">
        <div><h1 class="page-title"><span class="page-title-bar"></span>Pagos</h1><p class="page-sub" id="pagosSub"></p></div>
        <div class="page-actions"><button class="btn btn-primary btn-md" onclick="openPaymentModal()"><i class="fa-solid fa-plus"></i> Nuevo Cobro</button></div>
      </div>
      <div id="paymentsContainer"></div>
    </div>

    <!-- DOCUMENTOS -->
    <div class="view" id="view-documentos">
      <div class="page-header">
        <div><h1 class="page-title"><span class="page-title-bar"></span>Documentos</h1><p class="page-sub" id="docsSub"></p></div>
        <div class="page-actions"><button class="btn btn-primary btn-md" onclick="openDocModal()"><i class="fa-solid fa-plus"></i> Nuevo Documento</button></div>
      </div>
      <div id="docsContainer"></div>
    </div>

  </main>

  <nav class="mobile-nav" id="mobileNav">
    <div class="mobile-nav-inner" id="mobileNavInner"></div>
  </nav>
</div>

<div id="modalContainer"></div>
<div class="toast-container" id="toastContainer"></div>
<script src="assets/js/script.js"></script>
</body>
</html>
